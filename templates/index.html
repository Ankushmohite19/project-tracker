<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">PROJECT MANAGEMENT</p>
        <h1>Project Tracker Dashboard</h1>
      </div>
      <form action="/import" method="POST" enctype="multipart/form-data" class="import-box">
        <input type="file" name="file" required>
        <button type="submit">Import Excel</button>
      </form>
    </header>

    <section class="meta-card">
      <div class="meta-row">
        <label>PROJECT</label>
        <textarea placeholder="Enter Project Name"></textarea>
      </div>
      <div class="meta-row">
        <label>SUBJECT</label>
        <textarea placeholder="Enter Subject"></textarea>
      </div>
    </section>

    <section class="table-card">
      <div class="table-header">
        <h2>Action Items</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>SI No</th>
              <th>Agenda Points</th>
              <th>Discussion</th>
              <th>Responsibility</th>
              <th>Target Date</th>
              <th>Remarks</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            {% for row in rows %}
            <tr>
              <td><textarea>{{ row[0] }}</textarea></td>
              <td><textarea>{{ row[1] }}</textarea></td>
              <td><textarea>{{ row[2] }}</textarea></td>
              <td><textarea>{{ row[3] }}</textarea></td>
              <td><input type="date" value="{{ row[4] }}"></td>
              <td><textarea>{{ row[5] }}</textarea></td>
              <td><textarea>{{ row[6] }}</textarea></td>
              <td>
                <a class="delete-btn" href="{{ url_for('delete', task_id=row[0]) }}">Delete</a>
              </td>
            </tr>
            {% endfor %}

            <tr>
              <td><textarea name="sino" form="addForm"></textarea></td>
              <td><textarea name="agenda" form="addForm"></textarea></td>
              <td><textarea name="discussion" form="addForm"></textarea></td>
              <td><textarea name="responsibility" form="addForm"></textarea></td>
              <td><input type="date" name="target_date" form="addForm"></td>
              <td><textarea name="remarks" form="addForm"></textarea></td>
              <td><textarea name="status" form="addForm"></textarea></td>
              <td>
                <form id="addForm" action="/add" method="POST">
                  <button type="submit">Add</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</body>
</html>
